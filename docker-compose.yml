# 两种运行模式：
#   任务模式: docker compose up agent-task
#   服务模式: docker compose up agent-service

services:
  # ---- 任务模式（一次性执行） ----
  agent-task:
    build:
      context: .
      dockerfile: docker/agent-task/Dockerfile
    image: agent-task:v0.1.0
    container_name: agent-task
    environment:
      TASK_CONFIG: /workspace/agent-task.json
      OUTPUT_DIR: /workspace/output
      TRIGGER_MODE: once
    volumes:
      - ./workspace:/workspace
    restart: "no"

  # ---- 服务模式（常驻聊天/事件） ----
  agent-service:
    build:
      context: .
      dockerfile: docker/agent-service/Dockerfile
    image: agent-service:v0.1.0
    container_name: agent-service
    ports:
      - "8000:8000"
    environment:
      AGENT_WORKSPACE: /workspace
      MCP_CONFIG_PATH: /workspace/mcp_servers.json
      LLM_DEFAULT_MODEL: ${LLM_DEFAULT_MODEL:-qwen2.5-14b}
      LLM_MODELS_CONFIG_PATH: /workspace/models.yaml
      SKILLS_DIR: skills
    volumes:
      - ./workspace:/workspace
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
